name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # UNIT TESTS — mock all external services, run on multiple Python versions
  # ============================================================
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit tests (mocked external services)
      run: |
        pytest -m unit --cov=app --cov=modules --cov-report=xml --cov-report=term-missing -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # ============================================================
  # INTEGRATION TESTS — require Redis, but mock Ollama/Qdrant/Whisper
  # ============================================================
  integration-tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run integration tests
      run: |
        pytest -m integration --cov=app --cov=modules --cov-report=xml --cov-report=term-missing -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: integration
        name: codecov-integration

  # NOTE: E2E tests are intentionally disabled on GitHub Actions.
  # They require Docker Compose with GPU services (Ollama, Automatic1111, Whisper)
  # which are not available on GitHub-hosted runners.
  # Run E2E tests locally: docker exec flai-web pytest -m e2e -v --tb=short

  # ============================================================
  # CODE QUALITY — linting and formatting checks
  # ============================================================
  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install linting tools
      run: |
        pip install flake8 black isort

    - name: Run flake8
      run: |
        flake8 app/ modules/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ modules/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run black (check only)
      run: |
        black --check app/ modules/ tests/

    - name: Run isort (check only)
      run: |
        isort --check-only app/ modules/ tests/

  # ============================================================
  # SECURITY SCAN — static analysis, no external services needed
  # ============================================================
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install security tools
      run: |
        pip install bandit safety

    - name: Run bandit security scan
      run: |
        bandit -r app/ modules/ -f json -o bandit-report.json || true

    - name: Run safety check
      run: |
        safety check -r requirements.txt --json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json

