{% extends "base.html" %}

{% block content %}
<div class="login-wrapper">
    <div class="login-container">
        <h2>{{ _('Authorization') }}</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" id="login-form">
            <!-- CSRF token -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label for="login">{{ _('Login') }}:</label>
                <input type="text" id="login" name="login" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">{{ _('Password') }}:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <!-- Hidden field to pass selected theme -->
            <input type="hidden" name="theme" id="login-theme" value="light">
            <button type="submit">{{ _('Login') }}</button>
        </form>
    </div>
</div>

<script>
    // Set hidden theme input from localStorage when page loads
    (function() {
        const themeInput = document.getElementById('login-theme');
        const savedTheme = localStorage.getItem('guest_theme') || 'light';
        if (themeInput) themeInput.value = savedTheme;
    })();
</script>
{% endblock %}
