# docker-compose.all.yml
version: '3.8'

services:
  # ============================================================
  # WEB APPLICATION (Required)
  # ============================================================
  web:
    build: .
    container_name: flai-web
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - ollama
    volumes:
      # Mount application data directory
      - ./data:/app/data
      - ./.env:/app/.env:ro
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      # Whisper is running in the same docker network
      - WHISPER_API_URL=http://flai-whisper:9000/asr
      - WHISPER_API_TIMEOUT=120
    user: "1000:1000"
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================
  # REDIS (Required - Request Queue)
  # ============================================================
  redis:
    image: redis:8.0.6-alpine
    container_name: flai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # To use an external Redis instance:
    # Comment out this entire service block

  # ============================================================
  # OLLAMA (Required - LLM Inference)
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: flai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      - OLLAMA_REQUEST_TIMEOUT=1200s
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # To use an external Ollama instance:
    # Comment out this entire service block

  # ============================================================
  # AUTOMATIC1111 (Optional - Image Generation)
  # ============================================================
  automatic1111:
    image: siutin/stable-diffusion-webui-docker:latest-cuda
    container_name: flai-sd
    ports:
      - "7860:7860"
    volumes:
      - ./services/automatic1111/models/Stable-diffusion:/app/stable-diffusion-webui/models/Stable-diffusion
      - ./services/automatic1111/outputs:/app/stable-diffusion-webui/outputs
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - NVIDIA_REQUIRE_CUDA=cuda>=12.1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - /app/stable-diffusion-webui/webui.sh
      - --listen
      - --port=7860
      - --api
      - --api-log
      - --opt-sdp-attention
      - --medvram
      - --medvram-sdxl
      - --opt-split-attention
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/sdapi/v1/progress"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - with-image-gen
    # To disable image generation:
    # Comment out this entire service block OR omit the profile when starting

  # ============================================================
  # WHISPER ASR (Optional - Speech Recognition)
  # ============================================================
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: flai-whisper
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=medium
      - ASR_ENGINE=faster_whisper
      - ASR_DEVICE=cpu
    # To enable GPU acceleration for transcription, uncomment the block below:
    # environment:
    #   - ASR_DEVICE=cuda
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - with-voice
    # To disable voice features:
    # Comment out this entire service block

  # ============================================================
  # PIPER TTS (Optional - Speech Synthesis)
  # ============================================================
  piper:
    build:
      context: ./services/piper
      dockerfile: Dockerfile.piper
    container_name: flai-piper
    ports:
      - "18888:8888"
    volumes:
      - ./services/piper/piper_models:/app/models
    environment:
      - PIPER_MODEL_DIR=/app/models
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - with-voice
    # To disable voice features:
    # Comment out this entire service block

  # ============================================================
  # QDRANT (Optional - Vector Database for RAG)
  # ============================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: flai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
      - QDRANT__SERVICE__ENABLE_TLS=0
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - with-rag
    # To disable document search/RAG:
    # Comment out this entire service block

networks:
  flai_network:
    driver: bridge

volumes:
  redis_data:
  ollama:
  qdrant_data: