# docker-compose.gpu.yml
# GPU-enabled version (requires NVIDIA GPU + nvidia-docker)
services:
  # ============================================================
  # WEB APPLICATION (Required)
  # ============================================================
  web:
    build: .
    container_name: flai-web
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - postgres
      - llamacpp
    env_file:
      - .env
    volumes:
      # Mount application data directory
      - ./data:/app/data
      - ./.env:/app/.env:ro
      # Mount models directory for GGUF metadata reading
      - ./services/llamacpp/models:/models:ro
      # Mount docker socket for GPU detection
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WHISPER_API_URL=http://flai-whisper:9000/asr
      - WHISPER_API_TIMEOUT=120
      - SD_WRAPPER_URL=http://flai-sd:7861
    user: "0:988"
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # REDIS (Required - Request Queue)
  # ============================================================
  redis:
    image: redis:8.4.2-alpine
    container_name: flai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # LLAMACPP PRESET GENERATOR (init container)
  # Generates models-preset.ini from model_configs DB before llama.cpp starts
  # ============================================================
  llamacpp-presets:
    image: python:3.9-slim
    container_name: flai-llamacpp-presets
    volumes:
      - ./services/llamacpp/models:/models
      - ./services/llamacpp/generate_presets.py:/generate_presets.py:ro
    environment:
      - DATABASE_URL=postgresql://flai:flai_password@postgres:5432/flai
    command: >
      sh -c "pip install --no-cache-dir psycopg2-binary==2.9.9 && python3 /generate_presets.py"
    depends_on:
      - postgres
    restart: "no"
    networks:
      - flai_network

  # ============================================================
  # LLAMA.CPP SERVER (Required - LLM Inference, router mode)
  # ============================================================
  # Router mode: handles chat, reasoning, embedding, and multimodal.
  # Multimodal models must be in subdirectories with mmproj file named mmproj*.gguf
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: flai-llamacpp
    ports:
      - "8080:8033"
    volumes:
      - ./services/llamacpp/models:/models
    depends_on:
      - llamacpp-presets
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          cpus: '2.0'
          memory: 8G
    networks:
      - flai_network
    restart: unless-stopped
    # Router mode: --models-dir allows dynamic model switching
    # --models-max 1: only keep one model in VRAM at a time (avoid OOM on 16GB GPU)
    command: >
      --models-dir /models/
      --models-preset /models/models-preset.ini
      --models-max 1
      --ctx-size 16384
      --host 0.0.0.0
      --port 8033
      --n-gpu-layers -1
      --embeddings
      --batch-size 2048
      --ubatch-size 2048
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8033/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # STABLE-DIFFUSION.CPP (Optional - Image Generation)
  # ============================================================
  # Uses sd-cli directly via a Python HTTP wrapper (sd_wrapper.py)
  # The sd-server's /v1/images/generations endpoint doesn't work properly.
  sd_cpp:
    build:
      context: ./services/sd_cpp
      dockerfile: Dockerfile.sd_cpp
    container_name: flai-sd
    ports:
      - "7861:7861"
    volumes:
      - ./services/sd_cpp/models/diffusion_models:/app/models/diffusion_models
      - ./services/sd_cpp/models/vae:/app/models/vae
      - ./services/sd_cpp/models/text_encoders:/app/models/text_encoders
      - ./services/sd_cpp/outputs:/app/outputs
      - ./services/sd_cpp/sd_wrapper.py:/app/sd_wrapper.py:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 24G
        reservations:
          cpus: '4.0'
          memory: 16G
    networks:
      - flai_network
    restart: unless-stopped
    # Run sd-wrapper HTTP API on port 7861 (calls sd-cli internally)
    entrypoint: ["python3", "/app/sd_wrapper.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7861/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - with-image-gen
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # WHISPER ASR (Optional - Speech Recognition)
  # ============================================================
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:v1.9.1
    container_name: flai-whisper
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=medium
      - ASR_ENGINE=faster_whisper
      - ASR_DEVICE=cpu
    # To enable GPU acceleration for transcription, uncomment the block below:
    # environment:
    #   - ASR_DEVICE=cuda
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - with-voice

  # ============================================================
  # PIPER TTS (Optional - Speech Synthesis)
  # ============================================================
  piper:
    build:
      context: ./services/piper
      dockerfile: Dockerfile.piper
    container_name: flai-piper
    ports:
      - "18888:8888"
    volumes:
      - ./services/piper/piper_models:/app/models
    environment:
      - PIPER_MODEL_DIR=/app/models
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - with-voice

  # ============================================================
  # QDRANT (Optional - Vector Database for RAG)
  # ============================================================
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: flai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
      - QDRANT__SERVICE__ENABLE_TLS=0
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - with-rag

  # ============================================================
  # POSTGRESQL (Required)
  # ============================================================
  postgres:
    image: postgres:16.4-alpine
    container_name: flai-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=flai
      - POSTGRES_USER=flai
      - POSTGRES_PASSWORD=flai_password
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flai"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  flai_network:
    name: flai_flai_network
    driver: bridge

volumes:
  redis_data:
  qdrant_data:
  postgres_data:
