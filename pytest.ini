[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (with mocked services)
    e2e: End-to-end tests (requires running services)
    slow: Slow running tests (>1 second)
    requires_db: Tests that require database access
    requires_redis: Tests that require Redis access
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:flask_limiter
    ignore::UserWarning:qdrant_client


