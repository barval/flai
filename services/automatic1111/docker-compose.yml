version: '3.8'

# Automatic1111 Stable Diffusion Standalone Service
# Use this docker-compose for deploying SD on a separate server with GPU

services:
  sd:
    image: siutin/stable-diffusion-webui-docker:latest-cuda
    container_name: flai-sd
    ports:
      - "${SD_PORT:-7860}:7860"
    environment:
      - SD_MODEL=${SD_MODEL:-RealVisXL_V4.0.safetensors}
      - COMMANDLINE_ARGS=${SD_COMMANDLINE_ARGS:---api --listen}
    volumes:
      # Models directory (DO NOT DELETE - contains SD checkpoints)
      - ./models:/stable-diffusion-webui/models/Stable-diffusion
      # Outputs directory (DO NOT DELETE - contains generated images)
      - ./outputs:/stable-diffusion-webui/outputs
    networks:
      - flai_network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/sdapi/v1/progress"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s

networks:
  flai_network:
    driver: bridge
