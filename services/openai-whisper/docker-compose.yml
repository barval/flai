# services/openai-whisper/docker-compose.yml
# Standalone Whisper ASR deployment for distributed FLAI setup
version: '3.8'

services:
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: flai-whisper
    ports:
      - "${WHISPER_PORT:-9000}:9000"
    environment:
      - ASR_MODEL=${ASR_MODEL:-medium}
      - ASR_ENGINE=${ASR_ENGINE:-faster_whisper}
      - ASR_DEVICE=${ASR_DEVICE:-cpu}
    volumes:
      - whisper_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  whisper_cache: