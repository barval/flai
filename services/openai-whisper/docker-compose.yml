version: '3.8'

# Whisper ASR Standalone Service
# Use this docker-compose for deploying Whisper on a separate server

services:
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: flai-whisper
    ports:
      - "${WHISPER_PORT:-9000}:9000"
    environment:
      - ASR_MODEL=${ASR_MODEL:-medium}
      - ASR_ENGINE=${ASR_ENGINE:-faster_whisper}
      - ASR_DEVICE=${ASR_DEVICE:-cpu}
    volumes:
      - whisper_cache:/root/.cache/huggingface
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  whisper_cache:
    driver: local

networks:
  flai_network:
    driver: bridge
