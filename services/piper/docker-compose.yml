version: '3.8'

# Piper TTS Standalone Service
# Use this docker-compose for deploying Piper TTS on a separate server

services:
  piper:
    build:
      context: .
      dockerfile: Dockerfile.piper
    container_name: flai-piper
    ports:
      - "${PIPER_PORT:-8888}:8888"
    volumes:
      # Voice models directory (DO NOT DELETE - contains trained voice models)
      - ./piper_models:/app/piper_models:ro
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  piper_models_volume:
    driver: local

networks:
  flai_network:
    driver: bridge
