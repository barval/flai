# services/piper/docker-compose.yml
# Standalone Piper TTS deployment for distributed FLAI setup
version: '3.8'

services:
  piper:
    build:
      context: .
      dockerfile: Dockerfile.piper
    container_name: flai-piper
    ports:
      - "${PIPER_PORT:-8888}:8888"
    volumes:
      - ./piper_models:/app/models
    environment:
      - PIPER_MODEL_DIR=/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s