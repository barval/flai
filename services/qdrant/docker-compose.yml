version: '3.8'

# Qdrant Vector Database Standalone Service
# Use this docker-compose for deploying Qdrant on a separate server

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: flai-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
      - QDRANT__SERVICE__GRPC_PORT=${QDRANT_GRPC_PORT:-6334}
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - flai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  flai_network:
    driver: bridge
